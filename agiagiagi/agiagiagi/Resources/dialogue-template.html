<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dialogue</title>
<link rel="stylesheet" href="styles.css">
<style>
    body {
        background: linear-gradient(180deg, #0d1117 0%, #161b22 40%, #1a1f2e 100%);
        color: #e8ecf2;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* --- State Bar --- */
    .state-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding-top: calc(env(safe-area-inset-top) + 8px);
        padding-bottom: 8px;
        transition: color 0.3s ease, background 0.3s ease;
    }

    .state-bar--idle {
        color: rgba(255, 255, 255, 0.35);
    }

    .state-icon {
        display: none;
    }

    .state-bar--listening .state-icon--listening,
    .state-bar--thinking .state-icon--thinking,
    .state-bar--speaking .state-icon--speaking,
    .state-bar--idle .state-icon--idle {
        display: flex;
    }

    .state-icon--idle {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
    }

    /* --- Messages Area --- */
    .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        padding-top: calc(env(safe-area-inset-top) + 50px);
        padding-bottom: 16px;
        -webkit-overflow-scrolling: touch;
    }

    .messages-list {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        justify-content: flex-end;
    }

    .message--assistant {
        animation: slideInFromLeft 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
    }

    .message--user {
        animation: slideInFromRight 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
    }

    /* --- Typing indicator --- */
    .typing-indicator {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        padding-right: 40px;
        animation: slideInFromLeft 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
    }

    .typing-indicator .message__bubble {
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: 18px;
        border-bottom-left-radius: 6px;
    }

    .typing-dots {
        display: flex;
        gap: 5px;
        align-items: center;
    }

    .typing-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        animation: bounce 1.4s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

    /* --- Options Area --- */
    .options-area {
        padding: 8px 16px;
        padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
        background: linear-gradient(180deg, transparent 0%, rgba(13, 17, 23, 0.95) 20%);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
    }

    .options-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .rpg-btn {
        animation: slideIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
    }

    .rpg-btn__index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: rgba(100, 160, 255, 0.15);
        color: #8ab4ff;
        font-size: 0.72rem;
        font-weight: 700;
        margin-right: 10px;
        flex-shrink: 0;
    }

    .rpg-btn__text {
        flex: 1;
    }

    .rpg-btn__arrow {
        color: rgba(100, 160, 255, 0.4);
        font-size: 0.85rem;
        margin-left: 8px;
        transition: transform 0.2s ease, color 0.2s ease;
    }

    .rpg-btn:active .rpg-btn__arrow {
        transform: translateX(3px);
        color: rgba(100, 160, 255, 0.7);
    }

    /* --- Text Input (fallback) --- */
    .text-input-area {
        display: flex;
        gap: 8px;
        padding: 0 16px 8px 16px;
    }

    .text-input {
        flex: 1;
        padding: 10px 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        color: #e8ecf2;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
        font-size: 0.95rem;
        outline: none;
        -webkit-appearance: none;
        transition: border-color 0.2s ease;
    }

    .text-input:focus {
        border-color: rgba(100, 160, 255, 0.4);
    }

    .text-input::placeholder {
        color: rgba(255, 255, 255, 0.25);
    }

    .send-btn {
        width: 38px;
        height: 38px;
        border: none;
        border-radius: 50%;
        background: linear-gradient(135deg, #007aff, #0055d4);
        color: #fff;
        font-size: 1.1rem;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
    }

    .send-btn:active {
        transform: scale(0.9);
    }

    /* --- Empty State --- */
    .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        color: rgba(255, 255, 255, 0.35);
        text-align: center;
        gap: 12px;
    }

    .empty-state__icon {
        font-size: 2.5rem;
        opacity: 0.3;
    }

    .empty-state h2 {
        color: rgba(255, 255, 255, 0.5);
    }

    /* --- Scan line decoration --- */
    .scanline {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(0, 0, 0, 0.015) 3px,
            rgba(0, 0, 0, 0.015) 4px
        );
        z-index: 999;
    }
</style>
</head>
<body>

<div class="scanline"></div>

<!-- State bar -->
<div id="state-bar" class="state-bar state-bar--idle">
    <span class="state-icon state-icon--idle"></span>
    <span class="state-icon state-icon--listening"><span class="mic-icon"></span></span>
    <span class="state-icon state-icon--thinking">
        <span class="thinking-dots"><span></span><span></span><span></span></span>
    </span>
    <span class="state-icon state-icon--speaking">
        <span class="wave-bars"><span></span><span></span><span></span><span></span><span></span></span>
    </span>
    <span id="state-label">Ready</span>
</div>

<!-- Messages -->
<div class="messages-area" id="messages-area">
    <div class="messages-list" id="messages-list">
        <div class="empty-state" id="empty-state">
            <div class="empty-state__icon">&#9677;</div>
            <h2>Panel Assistant</h2>
            <p class="caption">Ask me about the panel...</p>
        </div>
    </div>
</div>

<!-- Options -->
<div class="options-area" id="options-area" style="display: none;">
    <div class="options-list" id="options-list"></div>
</div>

<!-- Text input -->
<div class="text-input-area" id="text-input-area" style="display: none;">
    <input type="text" class="text-input" id="text-input" placeholder="Type a message...">
    <button class="send-btn" id="send-btn" onclick="sendText()">&#9654;</button>
</div>

<script>
(function() {
    'use strict';

    var messagesList = document.getElementById('messages-list');
    var messagesArea = document.getElementById('messages-area');
    var optionsArea = document.getElementById('options-area');
    var optionsList = document.getElementById('options-list');
    var textInputArea = document.getElementById('text-input-area');
    var textInput = document.getElementById('text-input');
    var stateBar = document.getElementById('state-bar');
    var stateLabel = document.getElementById('state-label');
    var emptyState = document.getElementById('empty-state');
    var hasMessages = false;
    var typingEl = null;

    function escapeHtml(str) {
        if (typeof str !== 'string') return '';
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function postToSwift(payload) {
        try {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.dialogue) {
                window.webkit.messageHandlers.dialogue.postMessage(JSON.stringify(payload));
            }
        } catch (e) {
            console.log('Swift bridge not available:', e);
        }
    }

    function scrollToBottom() {
        requestAnimationFrame(function() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });
    }

    function removeEmpty() {
        if (emptyState) {
            emptyState.remove();
            emptyState = null;
        }
    }

    function removeTyping() {
        if (typingEl) {
            typingEl.remove();
            typingEl = null;
        }
    }

    function showTyping() {
        removeTyping();
        var html = '<div class="typing-indicator" id="typing-indicator">';
        html += '<div class="message__avatar message__avatar--assistant">&#9678;</div>';
        html += '<div class="message__bubble">';
        html += '<div class="typing-dots"><span></span><span></span><span></span></div>';
        html += '</div>';
        html += '</div>';

        var tmp = document.createElement('div');
        tmp.innerHTML = html;
        typingEl = tmp.firstChild;
        messagesList.appendChild(typingEl);
        scrollToBottom();
    }

    // --- Public API ---

    window.addMessage = function(jsonString) {
        try {
            var data = typeof jsonString === 'string' ? JSON.parse(jsonString) : jsonString;
            var role = data.role || 'assistant';
            var content = data.content || '';

            removeEmpty();
            removeTyping();
            hasMessages = true;

            var isAssistant = role === 'assistant';
            var msg = document.createElement('div');
            msg.className = 'message message--' + role;

            var avatarClass = isAssistant ? 'message__avatar--assistant' : 'message__avatar--user';
            var avatarIcon = isAssistant ? '&#9678;' : '&#9673;';

            msg.innerHTML =
                '<div class="message__avatar ' + avatarClass + '">' + avatarIcon + '</div>' +
                '<div class="message__bubble">' + escapeHtml(content) + '</div>';

            messagesList.appendChild(msg);
            scrollToBottom();
        } catch (e) {
            console.error('addMessage parse error:', e);
        }
    };

    window.setOptions = function(jsonString) {
        try {
            var options = typeof jsonString === 'string' ? JSON.parse(jsonString) : jsonString;

            if (!options || options.length === 0) {
                optionsArea.style.display = 'none';
                textInputArea.style.display = 'flex';
                return;
            }

            textInputArea.style.display = 'none';
            optionsArea.style.display = 'block';

            var html = '';
            for (var i = 0; i < options.length; i++) {
                var opt = options[i];
                var delay = (0.05 + i * 0.08);
                html += '<button class="rpg-btn" style="animation-delay: ' + delay + 's" onclick="selectOption(\'' + escapeHtml(opt.id) + '\')">';
                html += '<span class="rpg-btn__index">' + String.fromCharCode(65 + i) + '</span>';
                html += '<span class="rpg-btn__text">' + escapeHtml(opt.text) + '</span>';
                html += '<span class="rpg-btn__arrow">&#8250;</span>';
                html += '</button>';
            }

            optionsList.innerHTML = html;
            scrollToBottom();
        } catch (e) {
            console.error('setOptions parse error:', e);
        }
    };

    window.setState = function(state) {
        stateBar.className = 'state-bar state-bar--' + state;

        var labels = {
            'idle': 'Ready',
            'listening': 'Listening...',
            'thinking': 'Thinking...',
            'speaking': 'Speaking...'
        };
        stateLabel.textContent = labels[state] || state;

        if (state === 'thinking') {
            showTyping();
        } else {
            removeTyping();
        }
    };

    window.showTextInput = function() {
        optionsArea.style.display = 'none';
        textInputArea.style.display = 'flex';
        textInput.focus();
    };

    window.selectOption = function(optionId) {
        // Animate the selected button
        var buttons = optionsList.querySelectorAll('.rpg-btn');
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].classList.add('rpg-btn--selected');
            buttons[i].style.pointerEvents = 'none';
        }

        setTimeout(function() {
            optionsArea.style.display = 'none';
            postToSwift({ action: 'select', optionId: optionId });
        }, 300);
    };

    window.sendText = function() {
        var text = textInput.value.trim();
        if (!text) return;

        textInput.value = '';
        postToSwift({ action: 'text', content: text });
    };

    // Enter key sends text
    textInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            window.sendText();
        }
    });
})();
</script>

</body>
</html>
